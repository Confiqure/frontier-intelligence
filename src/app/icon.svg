<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0a0a0c"/>
  <!-- Pareto frontier curve -->
  <path d="M 5 26 C 8 20, 14 11, 27 6" stroke="#32D74B" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Frontier dots (on the curve) -->
  <circle cx="6.5" cy="23" r="2.4" fill="#32D74B"/>
  <circle cx="14" cy="13.5" r="2.4" fill="#32D74B"/>
  <circle cx="24.5" cy="7.5" r="2.4" fill="#32D74B"/>
  <!-- Off-frontier dots -->
  <circle cx="20" cy="21" r="1.7" fill="#a1a1a6" opacity="0.5"/>
  <circle cx="11" cy="24" r="1.7" fill="#a1a1a6" opacity="0.5"/>
  <circle cx="26.5" cy="15" r="1.7" fill="#a1a1a6" opacity="0.5"/>
</svg>
